<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Octopus Community — نظام العمليات الداخلي</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Octopus Ops">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111111; --card:#151515; --card2:#1b1b1b;
  --lime:#b8f10b; --lime-dim:#8fc009;
  --white:#f5f5f5; --grey:#9a9a9a; --grey2:#5e5e5e;
  --red:#ff5252; --red-bg:#3a1414; --orange:#ff9f43; --blue:#4fc3f7;
  --border:rgba(255,255,255,.09);
  --green-bg:#16321a; --green-tx:#7be07e;
  --yellow-bg:#3a3414; --yellow-tx:#e8d24a;
  --red-tx:#ff8a8a;
  --blue-bg:#10293a; --blue-tx:#7bc7ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--grey2);border-radius:4px}
button{cursor:pointer;font-family:'Cairo',sans-serif;border:none}
input,select,textarea{font-family:'Cairo',sans-serif}
a{color:inherit}

/* ===== Login ===== */
#login-screen{
  position:fixed;inset:0;background:radial-gradient(circle at 50% 20%,#161616,#070707 70%);
  display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:18px
}
#login-screen .logo{font-size:30px;font-weight:800;color:var(--lime);letter-spacing:1px}
#login-screen .sub{color:var(--grey);font-size:14px;margin-top:-12px}
#login-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px 34px;width:320px;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#login-box input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--white);font-size:15px;outline:none;text-align:center}
#login-box input:focus{border-color:var(--lime)}
#login-box button{background:var(--lime);color:#0a0a0a;font-weight:700;border-radius:8px;padding:12px;font-size:15px;transition:.15s}
#login-box button:hover{background:var(--lime-dim)}
#login-error{color:var(--red);font-size:13px;text-align:center;min-height:16px}

/* ===== App shell ===== */
#app{display:none}
#topbar{position:sticky;top:0;z-index:50;background:#000;border-bottom:1px solid var(--border);padding:0 22px}
#topbar .inner{display:flex;align-items:center;justify-content:space-between;height:62px}
#topbar .brand{font-weight:800;color:var(--lime);font-size:18px;display:flex;align-items:center;gap:10px}
#topbar .brand small{color:var(--grey);font-weight:400;font-size:12px}
#topbar .demo-badge{background:var(--yellow-bg);color:var(--yellow-tx);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
#tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 22px 0;background:#000;border-bottom:1px solid var(--border)}
.tab-btn{background:transparent;color:var(--grey);padding:10px 16px;border-radius:10px 10px 0 0;font-size:14px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.tab-btn:hover{color:var(--white)}
.tab-btn.active{color:var(--lime);border-bottom:2px solid var(--lime);background:var(--bg2)}
main{padding:24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ===== Generic widgets ===== */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-head h2{font-size:20px;font-weight:800}
.page-head .desc{color:var(--grey);font-size:12.5px;margin-top:3px}
.btn{background:var(--lime);color:#0a0a0a;font-weight:700;padding:9px 18px;border-radius:8px;font-size:13.5px;transition:.15s}
.btn:hover{background:var(--lime-dim)}
.btn.secondary{background:var(--card2);color:var(--white);border:1px solid var(--border)}
.btn.secondary:hover{border-color:var(--lime)}
.btn.danger{background:var(--red-bg);color:var(--red-tx)}
.btn.small{padding:5px 11px;font-size:12px;border-radius:6px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.kpi-card .lbl{color:var(--grey);font-size:12.5px;margin-bottom:8px}
.kpi-card .val{font-size:26px;font-weight:800;color:var(--lime)}
.kpi-card.alert .val{color:var(--red-tx)}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.card h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg2);color:var(--grey);font-weight:600;text-align:right;padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:hover{background:rgba(255,255,255,.025)}
.table-wrap{overflow-x:auto}
.empty-row td{color:var(--grey2);text-align:center;padding:24px;font-style:italic}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.badge.green{background:var(--green-bg);color:var(--green-tx)}
.badge.yellow{background:var(--yellow-bg);color:var(--yellow-tx)}
.badge.red{background:var(--red-bg);color:var(--red-tx)}
.badge.blue{background:var(--blue-bg);color:var(--blue-tx)}
.badge.grey{background:#262626;color:var(--grey)}

.client-list{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.client-chip{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s}
.client-chip:hover{border-color:var(--lime)}
.client-chip.active{background:var(--lime);color:#0a0a0a;border-color:var(--lime)}
.client-chip .n{color:var(--grey);font-weight:400;font-size:11.5px;margin-right:6px}
.client-chip.active .n{color:#333}

.strategy-row{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:.15s}
.strategy-row:hover{border-color:var(--lime)}
.strategy-row.active{border-color:var(--lime);background:#1a1f0c}
.strategy-row .t{font-weight:700;font-size:14px}
.strategy-row .meta{color:var(--grey);font-size:11.5px;margin-top:3px}

/* ===== Modal ===== */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
#modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
#modal-box h3{font-size:16px;font-weight:800;margin-bottom:16px;color:var(--lime)}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;color:var(--grey);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--white);font-size:13.5px;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--lime)}
.field textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0a0a0a;font-weight:700;padding:11px 22px;border-radius:30px;font-size:13.5px;z-index:300;box-shadow:0 10px 30px rgba(0,0,0,.4);display:none}

.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px}

@media (max-width:680px){
  main{padding:14px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  #topbar .brand small{display:none}
}
</style>
</head>

/* ============================================================
   طبقة الوصول للبيانات (Supabase أو وضع تجريبي) — باقي الكود
   مش محتاج يعرف هو شغال على إيه
   ============================================================ */
async function dbSelect(table, orderCol) {
  if (DEMO_MODE) {
    let rows = [...DEMO_DB[table]];
    if (orderCol) rows.sort((a, b) => (a[orderCol] > b[orderCol] ? 1 : -1));
    return rows;
  }
  let q = supa.from(table).select("*");
  if (orderCol) q = q.order(orderCol, { ascending: true });
  const { data, error } = await q;
  if (error) { console.error(error); showToast("خطأ في تحميل البيانات: " + error.message); return []; }
  return data || [];
}
async function dbInsert(table, row) {
  if (DEMO_MODE) {
    row = { ...row, id: nextDemoId[table]++ };
    DEMO_DB[table].push(row);
    return row;
  }
  const { data, error } = await supa.from(table).insert(row).select().single();
  if (error) { showToast("خطأ: " + error.message); throw error; }
  return data;
}
async function dbUpdate(table, id, row) {
  if (DEMO_MODE) {
    const i = DEMO_DB[table].findIndex(r => r.id === id);
    if (i > -1) DEMO_DB[table][i] = { ...DEMO_DB[table][i], ...row };
    return DEMO_DB[table][i];
  }
  const { data, error } = await supa.from(table).update(row).eq("id", id).select().single();
  if (error) { showToast("خطأ: " + error.message); throw error; }
  return data;
}
async function dbDelete(table, id) {
  if (DEMO_MODE) {
    DEMO_DB[table] = DEMO_DB[table].filter(r => r.id !== id);
    return;
  }
  const { error } = await supa.from(table).delete().eq("id", id);
  if (error) { showToast("خطأ: " + error.message); throw error; }
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => { el.style.display = "none"; }, 2800);
}
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
/* بيستخدم لتمرير object كـ JSON جوة attribute متلفوف بـ '...' - لازم نهرّب أي ' داخلية
   لإنها بتقفل الـ attribute بدري لو موجودة (مثلاً عنوان فيه Program's). */
function jsAttr(obj) {
  return JSON.stringify(obj).replace(/'/g, "&#39;");
}
function fmtMoney(n) {
  n = Number(n) || 0;
  return n.toLocaleString("en-US", { maximumFractionDigits: 0 }) + " EGP";
}
function fmtHours(n) {
  return (Math.round((Number(n) || 0) * 10) / 10) + " ساعة";
}

function fieldInputHTML(field, value) {
  const v = value !== undefined && value !== null ? value : (field.default !== undefined ? field.default : "");
  if (field.type === "select") {
    const opts = field.options.map(o => `<option value="${escapeHtml(o)}" ${String(o) === String(v) ? "selected" : ""}>${escapeHtml(o)}</option>`).join("");
    return `<select data-field="${field.key}">${opts}</select>`;
  }
  if (field.type === "select-ref") {
    const rows = CACHE[field.refTable] || [];
    let opts = `<option value="">${field.required ? "اختاري..." : "بدون"}</option>`;
    opts += rows.map(r => `<option value="${r.id}" ${String(r.id) === String(v) ? "selected" : ""}>${escapeHtml(r[field.refLabel])}</option>`).join("");
    return `<select data-field="${field.key}">${opts}</select>`;
  }
  if (field.type === "textarea") {
    return `<textarea data-field="${field.key}">${escapeHtml(v)}</textarea>`;
  }
  return `<input type="${field.type}" data-field="${field.key}" value="${escapeHtml(v)}">`;
}

function openGenericModal(moduleKey, existingRow, onSaved, fieldOverrides) {
  fieldOverrides = fieldOverrides || {};
  const mod = MODULES[moduleKey];
  const isEdit = !!existingRow;
  const box = document.getElementById("modal-box");
  box.innerHTML = `
    <h3>${isEdit ? "تعديل" : "إضافة"} ${mod.titleSingle}</h3>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn" id="modal-save-btn">حفظ</button>
    </div>`;
  const fieldsEl = document.getElementById("modal-fields");
  fieldsEl.innerHTML = mod.fields.map(f => {
    const fEff = fieldOverrides[f.key] ? { ...f, ...fieldOverrides[f.key] } : f;
    return `
    <div class="field">
      <label>${fEff.label}${fEff.required ? " *" : ""}</label>
      ${fieldInputHTML(fEff, existingRow ? existingRow[f.key] : undefined)}
    </div>`;
  }).join("");
  document.getElementById("modal-save-btn").onclick = async () => {
    const row = {};
    let valid = true;
    mod.fields.forEach(f => {
      const inputEl = fieldsEl.querySelector(`[data-field="${f.key}"]`);
      let val = inputEl.value;
      if (f.type === "number") val = val === "" ? null : Number(val);
      if (f.type === "select-ref") val = val === "" ? null : Number(val);
      if (f.required && (val === "" || val === null)) valid = false;
      row[f.key] = val;
    });
    if (!valid) { showToast("فيه حقول مطلوبة لسه فاضية"); return; }
    if (moduleKey === "tasks") {
      const wasCompleted = isEdit && existingRow.status === "مكتمل";
      const isNowCompleted = row.status === "مكتمل";
      if (isNowCompleted && !wasCompleted) row.completed_at = new Date().toISOString();
      else if (!isNowCompleted && wasCompleted) row.completed_at = null;
    }
    try {
      if (isEdit) await dbUpdate(mod.table, existingRow.id, row);
      else await dbInsert(mod.table, row);
      closeModal();
      showToast("تم الحفظ بنجاح ✓");
      if (onSaved) await onSaved();
    } catch (e) { /* رسالة الخطأ ظهرت في showToast جوا dbInsert/dbUpdate */ }
  };
  document.getElementById("modal-overlay").style.display = "flex";
}
function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
}
async function deleteRow(table, id, onDeleted, confirmMsg) {
  if (!confirm(confirmMsg || "متأكدة عاوزة تمسحي الصف ده؟")) return;
  await dbDelete(table, id);
  showToast("تم الحذف");
  if (onDeleted) await onDeleted();
}

async function refreshAndRender(table) {

/* ============================================================
   تاب المرتبات — يحسب الإضافي من ساعات المهام الفعلية + خصومات الغياب/الإجازة
   ============================================================ */
function currentMonthStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function inMonth(dateStr, monthStr) {
  if (!dateStr) return false;
  return dateStr.slice(0, 7) === monthStr;
}

/* ============================================================
   أدوات حساب أيام الشغل الفعلية بناءً على الإجازة الأسبوعية الحقيقية
   لكل موظف (مش رقم ثابت 26) + التفرقة بين إضافي يوم عادي (×1.5)
   وإضافي يوم الإجازة الأسبوعية نفسه (×2)
   ============================================================ */
const ARABIC_WEEKDAYS = ["الأحد", "الإتنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
function normalizeArabic(s) {
  return (s || "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي");
}
function weekdayNameOf(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return ARABIC_WEEKDAYS[d.getDay()];
}
function employeeOffDayNames(emp) {
  const txt = normalizeArabic(emp.weekly_off || "");
  return ARABIC_WEEKDAYS.filter(day => txt.includes(normalizeArabic(day)));
}
function isEmployeeOffDate(emp, dateStr) {
  const offDays = employeeOffDayNames(emp);
  if (!offDays.length) return false; // مفيش إجازة أسبوعية محددة لهذا الموظف - مينفعش نحدد، فنعتبره يوم شغل عادي
  return offDays.includes(weekdayNameOf(dateStr));
}
function daysInCalendarMonth(monthStr) {
  const [y, m] = monthStr.split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function workDaysInMonthForEmployee(emp, monthStr) {
  const [y, m] = monthStr.split("-").map(Number);
  const total = daysInCalendarMonth(monthStr);
  let count = 0;
  for (let day = 1; day <= total; day++) {
    const dateStr = `${y}-${String(m).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    if (!isEmployeeOffDate(emp, dateStr)) count++;
  }
  return count;
}

function computePayrollForMonth(monthStr) {
  return CACHE.employees.map(emp => {
    const workDays = workDaysInMonthForEmployee(emp, monthStr);
    const stdDaily = Number(emp.standard_daily_hours) || 8;
    const expectedMonthlyHours = stdDaily * workDays;
    const hourlyRate = expectedMonthlyHours > 0 ? (Number(emp.basic_salary) || 0) / expectedMonthlyHours : 0;
    const dailyRate = workDays > 0 ? (Number(emp.basic_salary) || 0) / workDays : 0;

    // نجمع ساعات التاسكات الفعلية لكل يوم على حدة عشان نعرف هل اليوم ده كان يوم إجازته الأسبوعية ولا يوم شغل عادي
    const hoursByDate = {};
    CACHE.tasks.filter(t => t.assignee_id === emp.id && inMonth(t.task_date, monthStr)).forEach(t => {
      hoursByDate[t.task_date] = (hoursByDate[t.task_date] || 0) + (Number(t.actual_hours) || 0);
    });
    let taskHours = 0, regularOvertimeHours = 0, offDayOvertimeHours = 0;
    Object.entries(hoursByDate).forEach(([dateStr, hrs]) => {
      taskHours += hrs;
      if (isEmployeeOffDate(emp, dateStr)) {
        offDayOvertimeHours += hrs; // أي ساعة شغل في يوم إجازته الأسبوعية = إضافي ×2 بالكامل
      } else if (hrs > stdDaily) {
        regularOvertimeHours += (hrs - stdDaily); // إضافي ×1.5 بس للساعات اللي زادت عن المعتمد في يوم شغل عادي
      }
    });
    const overtimePayFromTasks = regularOvertimeHours * hourlyRate * 1.5 + offDayOvertimeHours * hourlyRate * 2;

    // الوقت الإضافي اليدوي المسجّل في تاب الحضور والإجازات - بيتجمع مع إضافي التاسكات
    const manualEntries = CACHE.overtime_log.filter(o => o.employee_id === emp.id && inMonth(o.work_date, monthStr));
    const manualOvertimeHours = manualEntries.reduce((sum, o) => sum + (Number(o.hours) || 0), 0);
    const manualOvertimePay = manualEntries.reduce((sum, o) => sum + (Number(o.hours) || 0) * hourlyRate * (Number(o.rate_multiplier) || 1.5), 0);

    const overtimePay = overtimePayFromTasks + manualOvertimePay;

    const absenceDays = CACHE.attendance.filter(a => a.employee_id === emp.id && a.status === "غياب" && inMonth(a.work_date, monthStr)).length;
    const absenceDeduction = absenceDays * dailyRate;

    const unpaidLeaveDays = CACHE.leaves
      .filter(l => l.employee_id === emp.id && l.leave_type === "بدون راتب" && l.status === "معتمدة" && inMonth(l.start_date, monthStr))
      .reduce((sum, l) => sum + (leaveDays(l) === "-" ? 0 : leaveDays(l)), 0);
    const unpaidDeduction = unpaidLeaveDays * dailyRate;

    const netPay = (Number(emp.basic_salary) || 0) + overtimePay - absenceDeduction - unpaidDeduction;
    return {
      employee: emp, workDays, taskHours, hourlyRate, regularOvertimeHours, offDayOvertimeHours,
      manualOvertimeHours, manualOvertimePay, overtimePay,
      absenceDays, absenceDeduction, unpaidLeaveDays, unpaidDeduction, netPay,
      hasWeeklyOffDefined: employeeOffDayNames(emp).length > 0
    };
  });
}

/* ============================================================
   تاب تقييم الموظفين - KPIs شهرية: % في الميعاد، عدد المنجز، كفاءة الوقت، الحضور والانضباط
   ============================================================ */
function computeEmployeeKPIs(monthStr) {
  return CACHE.employees.map(emp => {
    const completedThisMonth = CACHE.tasks.filter(t =>
      t.assignee_id === emp.id && t.status === "مكتمل" && t.completed_at && inMonth(t.completed_at.slice(0, 10), monthStr)
    );
    const completedCount = completedThisMonth.length;
    const withDue = completedThisMonth.filter(t => t.due_date);
    const onTimeCount = withDue.filter(t => t.completed_at.slice(0, 10) <= t.due_date).length;
    const onTimePct = withDue.length ? Math.round((onTimeCount / withDue.length) * 100) : null;
    const totalEstimated = completedThisMonth.reduce((s, t) => s + (Number(t.estimated_hours) || 0), 0);
    const totalActual = completedThisMonth.reduce((s, t) => s + (Number(t.actual_hours) || 0), 0);
    const efficiencyPct = totalEstimated > 0 ? Math.round((totalActual / totalEstimated) * 100) : null;
    const monthAttendance = CACHE.attendance.filter(a => a.employee_id === emp.id && inMonth(a.work_date, monthStr));
    const absences = monthAttendance.filter(a => a.status === "غياب").length;
    const lateDays = monthAttendance.filter(a => a.status === "متأخر").length;

    let overall, overallColor;
    if (completedCount === 0 && absences === 0 && lateDays === 0) { overall = "لا توجد بيانات كافية"; overallColor = "grey"; }
    else if ((onTimePct !== null && onTimePct < 50) || absences >= 3) { overall = "يحتاج انتباه"; overallColor = "red"; }
    else if ((onTimePct === null || onTimePct >= 80) && (efficiencyPct === null || (efficiencyPct >= 70 && efficiencyPct <= 130)) && absences === 0 && lateDays <= 1) { overall = "ممتاز"; overallColor = "green"; }
    else { overall = "جيد"; overallColor = "yellow"; }

    return { emp, completedCount, onTimePct, efficiencyPct, absences, lateDays, overall, overallColor };
  });
}

/* ============================================================
   تاب المدفوعات - مستحقات شهرية لكل عميل + سجل دفعات يدعم دفعات جزئية متعددة لنفس الشهر
   ============================================================ */
function contractMonthlyTotal(client) {
  const baseAmount = client.has_contract === "نعم" ? (Number(client.contract_amount) || 0) : 0;
  const taxes = client.tax_applicable === "نعم" ? (Number(client.contract_taxes) || 0) : 0;
  const extra = Number(client.contract_extra_fees) || 0;
  const adCommission = (Number(client.ad_spend_monthly) || 0) * (Number(client.ad_commission_percent) || 0) / 100;
  return baseAmount + taxes + extra + adCommission;
}
function contractBreakdownText(client) {
  const parts = [];
  if (client.has_contract === "نعم" && Number(client.contract_amount)) parts.push(`عقد ${fmtMoney(client.contract_amount)}`);
  if (client.tax_applicable === "نعم" && Number(client.contract_taxes)) parts.push(`ضريبة ${fmtMoney(client.contract_taxes)}`);
  if (Number(client.contract_extra_fees)) parts.push(`رسوم إضافية ${fmtMoney(client.contract_extra_fees)}`);
  const adCommission = (Number(client.ad_spend_monthly) || 0) * (Number(client.ad_commission_percent) || 0) / 100;
  if (adCommission) parts.push(`عمولة إعلانات ${fmtMoney(adCommission)} (${client.ad_commission_percent}% من ${fmtMoney(client.ad_spend_monthly)})`);
  return parts.join(" + ");
}
function isPaymentLate(client, monthStr, remaining) {
  if (remaining <= 0) return false;
  const dueDay = Number(client.payment_due_day);
  if (!dueDay) return false;
  const nowMonth = currentMonthStr();
  if (monthStr < nowMonth) return true;
  if (monthStr > nowMonth) return false;
  return new Date().getDate() > dueDay;
}
function computePaymentsForMonth(monthStr) {
  return CACHE.clients.map(client => {
    const due = contractMonthlyTotal(client);
    const entries = CACHE.payments.filter(p => p.client_id === client.id && p.billing_month === monthStr);
    const paid = entries.reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
    const remaining = due - paid;
    let status, statusColor;
    if (due <= 0) { status = "لا يوجد مستحق"; statusColor = "grey"; }
    else if (remaining <= 0) { status = "مدفوع بالكامل"; statusColor = "green"; }
    else if (isPaymentLate(client, monthStr, remaining)) { status = "متأخر ⚠"; statusColor = "red"; }
    else if (paid > 0) { status = "مدفوع جزئيًا"; statusColor = "yellow"; }
    else { status = "لسه مفيش دفع"; statusColor = "red"; }
    return { client, due, paid, remaining, status, statusColor, entriesCount: entries.length };
  });
}
function last6Months() {
  const year = new Date().getFullYear();
  const months = [];
  for (let m = 6; m <= 12; m++) {
    months.push(year + "-" + String(m).padStart(2, "0"));
  }
  return months;
}

/* ============================================================
   تاب المصاريف - مصاريف الوكالة بكل تفاصيلها، تتخصم أوتوماتيك من الإيرادات (المدفوعات) + صافي المرتبات
   ============================================================ */
function prevMonthStr(monthStr) {
  const [y, m] = monthStr.split("-").map(Number);
  const d = new Date(y, m - 2, 1);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function totalRevenueForMonth(monthStr) {
  const fromContracts = CACHE.payments.filter(p => p.billing_month === monthStr).reduce((s, p) => s + (Number(p.amount) || 0), 0);
  const fromExtra = CACHE.extra_revenue.filter(e => e.billing_month === monthStr).reduce((s, e) => s + (Number(e.amount) || 0), 0);
  return fromContracts + fromExtra;
}
function totalPayrollForMonth(monthStr) {
  try { return computePayrollForMonth(monthStr).reduce((s, r) => s + r.netPay, 0); } catch (e) { return 0; }
}
function manualExpensesForMonth(monthStr) {
  return CACHE.expenses.filter(e => e.billing_month === monthStr);
}
function totalExpensesForMonth(monthStr) {
  return totalPayrollForMonth(monthStr) + manualExpensesForMonth(monthStr).reduce((s, e) => s + (Number(e.amount) || 0), 0);
}
async function renderExpensesTab(main) {
  const month = currentMonthStr();
  main.innerHTML = `
    <div class="page-head">
      <div><h2>المصاريف</h2><div class="desc">كل مصاريف الوكالة بالتفصيل - بتُخصم تلقائي من الإيرادات (المدفوعات المستلمة) + صافي المرتبات لحساب صافي الربح الحقيقي شهريًا</div></div>
    </div>
    <div class="filter-bar">
      <label style="color:var(--grey);font-size:13px">الشهر:</label>
      <input type="month" id="expenses-month" value="${month}" onchange="renderExpensesTable()">
      <button class="btn small secondary" onclick="copyRecurringExpenses()">📋 نسخ المصاريف المتكررة من الشهر اللي فات</button>
      <button class="btn small secondary" onclick="openInstallmentModal()">🧾 تسجيل مصروف بالتقسيط</button>
    </div>
    <div class="kpi-grid" id="expenses-kpis"></div>

    <div class="card">
      <h3>توزيع المصاريف حسب التصنيف</h3>
      <div class="table-wrap" id="expenses-category-table"></div>
    </div>

    <div class="card">
      <h3>نظرة على شهور يونيو - ديسمبر</h3>
      <div class="desc" style="margin-bottom:10px">الإيرادات والمصاريف وصافي الربح شهر بشهر</div>
      <div class="table-wrap" id="expenses-overview"></div>
    </div>

    <div class="card">
      <h3>سجل المصاريف <button class="btn small" onclick="openGenericModal('expenses', null, ()=>refreshAndRender('expenses'))">+ مصروف جديد</button></h3>
      <div class="table-wrap" id="expenses-log-table"></div>
    </div>`;
  renderExpensesTable();
  renderExpensesOverview();
  renderExpensesLogTable();
}
function renderExpensesTable() {
  const month = document.getElementById("expenses-month").value || currentMonthStr();
  const contractRevenue = CACHE.payments.filter(p => p.billing_month === month).reduce((s, p) => s + (Number(p.amount) || 0), 0);
  const extraRevenue = CACHE.extra_revenue.filter(e => e.billing_month === month).reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const revenue = contractRevenue + extraRevenue;
  const payroll = totalPayrollForMonth(month);
  const manual = manualExpensesForMonth(month);
  const manualTotal = manual.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const totalExp = payroll + manualTotal;
  const net = revenue - totalExp;

  document.getElementById("expenses-kpis").innerHTML = `
    <div class="kpi-card"><div class="lbl">الإيرادات (${month})</div><div class="val" style="color:var(--lime)">${fmtMoney(revenue)}</div><div style="font-size:11px;color:var(--grey);margin-top:4px">منها تعاقد: ${fmtMoney(contractRevenue)} + إضافي: ${fmtMoney(extraRevenue)}</div></div>
    <div class="kpi-card"><div class="lbl">إجمالي المصاريف</div><div class="val" style="color:var(--red-tx)">${fmtMoney(totalExp)}</div><div style="font-size:11px;color:var(--grey);margin-top:4px">منها مرتبات: ${fmtMoney(payroll)} + مصاريف يدوية: ${fmtMoney(manualTotal)}</div></div>
    <div class="kpi-card"><div class="lbl">صافي الربح</div><div class="val" style="color:${net >= 0 ? "var(--lime)" : "var(--red-tx)"}">${fmtMoney(net)}</div></div>`;

  const byCategory = {};
  manual.forEach(e => { byCategory[e.category || "غير محدد"] = (byCategory[e.category || "غير محدد"] || 0) + (Number(e.amount) || 0); });
  const catEl = document.getElementById("expenses-category-table");
  const catRows = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
  catEl.innerHTML = `<table>
    <thead><tr><th>التصنيف</th><th>الإجمالي</th></tr></thead>
    <tbody>
      <tr><td><b>رواتب وأجور (تلقائي من تاب المرتبات)</b></td><td><b>${fmtMoney(payroll)}</b></td></tr>
      ${catRows.map(([cat, amt]) => `<tr><td>${escapeHtml(cat)}</td><td>${fmtMoney(amt)}</td></tr>`).join("") || ""}
      ${!catRows.length ? `<tr><td colspan="2" style="color:var(--grey)">لسه مفيش مصاريف يدوية مسجّلة هذا الشهر</td></tr>` : ""}
      <tr style="border-top:2px solid var(--border)"><td><b>الإجمالي</b></td><td><b>${fmtMoney(totalExp)}</b></td></tr>
    </tbody></table>`;
}
function renderExpensesOverview() {
  const months = last6Months();
  const el = document.getElementById("expenses-overview");
  el.innerHTML = `<table>
    <thead><tr><th>الشهر</th><th>الإيرادات</th><th>المصاريف</th><th>صافي الربح</th></tr></thead>
    <tbody>${months.map(m => {
      const rev = totalRevenueForMonth(m);
      const exp = totalExpensesForMonth(m);
      const net = rev - exp;
      return `<tr><td><b>${m}</b></td><td style="color:var(--lime)">${fmtMoney(rev)}</td><td style="color:var(--red-tx)">${fmtMoney(exp)}</td><td style="color:${net >= 0 ? "var(--lime)" : "var(--red-tx)"}"><b>${fmtMoney(net)}</b></td></tr>`;
    }).join("")}
    </tbody></table>`;
}
function renderExpensesLogTable() {
  const rows = [...CACHE.expenses].sort((a, b) => (a.expense_date < b.expense_date ? 1 : -1));
  const el = document.getElementById("expenses-log-table");
  if (!rows.length) { el.innerHTML = `<table><tbody><tr class="empty-row"><td>لسه مفيش مصاريف مسجّلة</td></tr></tbody></table>`; return; }
  el.innerHTML = `<table>
    <thead><tr><th>التصنيف</th><th>الوصف</th><th>الشهر</th><th>تاريخ الدفع</th><th>المبلغ</th><th>متكرر؟</th><th>طريقة الدفع</th><th></th></tr></thead>
    <tbody>${rows.map(r => `
      <tr>
        <td>${escapeHtml(r.category || "-")}</td>
        <td><b>${escapeHtml(r.description)}</b>${r.notes ? `<div style="font-size:11px;color:var(--grey)">${escapeHtml(r.notes)}</div>` : ""}</td>
        <td>${r.billing_month || "-"}</td>
        <td>${r.expense_date || "-"}</td>
        <td style="color:var(--red-tx)">${fmtMoney(r.amount)}</td>
        <td>${r.is_recurring === "نعم" ? '<span class="badge blue">متكرر</span>' : "-"}</td>
        <td>${escapeHtml(r.payment_method || "-")}</td>
        <td>
          <button class="btn small secondary" onclick='openGenericModal("expenses", ${jsAttr(r)}, ()=>refreshAndRender("expenses"))'>تعديل</button>
          <button class="btn small danger" onclick="deleteRow('expenses', ${r.id}, ()=>refreshAndRender('expenses'))">حذف</button>
        </td>
      </tr>`).join("")}
    </tbody></table>`;
}
async function copyRecurringExpenses() {
  const month = document.getElementById("expenses-month").value || currentMonthStr();
  const prev = prevMonthStr(month);
  const recurring = CACHE.expenses.filter(e => e.billing_month === prev && e.is_recurring === "نعم");
  if (!recurring.length) { showToast("مفيش مصاريف متكررة في " + prev + " تتنسخ"); return; }
  const existingThisMonth = CACHE.expenses.filter(e => e.billing_month === month);
  let copied = 0;
  for (const e of recurring) {
    const alreadyExists = existingThisMonth.some(x => x.description === e.description && x.category === e.category);
    if (alreadyExists) continue;
    await dbInsert("expenses", {
      category: e.category, description: e.description, amount: e.amount,
      billing_month: month, expense_date: month + "-01",
      is_recurring: "نعم", payment_method: e.payment_method, notes: e.notes
    });
    copied++;
  }
  await refreshCache(["expenses"]);
  renderExpensesTable(); renderExpensesOverview(); renderExpensesLogTable();
  showToast(copied ? `تم نسخ ${copied} مصروف متكرر من ${prev}` : "كل المصاريف المتكررة كانت منسوخة بالفعل");
}
function addMonthsToStr(monthStr, n) {
  const [y, m] = monthStr.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function openInstallmentModal() {
  const box = document.getElementById("modal-box");
  const month = document.getElementById("expenses-month")?.value || currentMonthStr();
  box.innerHTML = `
    <h3>تسجيل مصروف بالتقسيط</h3>
    <div class="desc" style="margin-bottom:10px">هتدخلي القيمة الإجمالية وعدد الدفعات، والنظام يقسمها تلقائي على شهور متتالية كمصاريف منفصلة - زي شراء كاميرا أو جهاز على 3 أو 4 دفعات</div>
    <div class="field"><label>التصنيف *</label>
      <select data-field="category">${MODULES.expenses.fields[0].options.map(o => `<option>${escapeHtml(o)}</option>`).join("")}</select>
    </div>
    <div class="field"><label>وصف المصروف (هيتضاف له "دفعة X من Y" تلقائي) *</label><input data-field="description" type="text" placeholder="مثلاً: كاميرا سوني A7IV"></div>
    <div class="field"><label>القيمة الإجمالية *</label><input data-field="total_amount" type="number"></div>
    <div class="field"><label>عدد الدفعات *</label><input data-field="installments_count" type="number" min="2" value="3"></div>
    <div class="field"><label>الشهر اللي تبدأ منه أول دفعة *</label><input data-field="start_month" type="month" value="${month}"></div>
    <div class="field"><label>طريقة الدفع</label>
      <select data-field="payment_method"><option>تحويل بنكي</option><option>بطاقة</option><option>كاش</option><option>شيك</option><option>أخرى</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn" id="modal-save-btn">تقسيم وحفظ</button>
    </div>`;
  document.getElementById("modal-save-btn").onclick = async () => {
    const category = box.querySelector('[data-field="category"]').value;
    const description = box.querySelector('[data-field="description"]').value.trim();
    const total = Number(box.querySelector('[data-field="total_amount"]').value);
    const count = Math.max(2, parseInt(box.querySelector('[data-field="installments_count"]').value) || 0);
    const startMonth = box.querySelector('[data-field="start_month"]').value;
    const paymentMethod = box.querySelector('[data-field="payment_method"]').value;
    if (!description || !total || !count || !startMonth) { showToast("فيه حقول مطلوبة لسه فاضية"); return; }
    const baseAmount = Math.floor((total / count) * 100) / 100;
    let remaining = total;
    for (let i = 0; i < count; i++) {
      const isLast = i === count - 1;
      const amount = isLast ? Math.round(remaining * 100) / 100 : baseAmount;
      remaining -= amount;
      const billingMonth = addMonthsToStr(startMonth, i);
      await dbInsert("expenses", {
        category, description: `${description} (دفعة ${i + 1} من ${count})`, amount,
        billing_month: billingMonth, expense_date: billingMonth + "-01",
        is_recurring: "لا", payment_method: paymentMethod,
        notes: `جزء من تقسيط: إجمالي ${fmtMoney(total)} على ${count} دفعات بادئة ${startMonth}`
      });
    }
    closeModal();
    await refreshCache(["expenses"]);
    if (document.getElementById("expenses-kpis")) { renderExpensesTable(); renderExpensesOverview(); renderExpensesLogTable(); }
    showToast(`تم تسجيل ${count} دفعات بنجاح ✓`);
  };
  document.getElementById("modal-overlay").style.display = "flex";
}

/* ============================================================
   تاب لوحة المتابعة
   ============================================================ */
async function renderDashboardTab(main) {
  const month = currentMonthStr();
  const payroll = computePayrollForMonth(month);
  const totalNet = payroll.reduce((s, r) => s + r.netPay, 0);
  const activeClients = CACHE.clients.filter(c => c.status === "نشط").length;
  const activeStrategies = CACHE.strategies.filter(s => s.status === "قيد التنفيذ").length;
  const openTasks = CACHE.tasks.filter(t => t.status !== "مكتمل").length;
  const overdueTasks = CACHE.tasks.filter(t => t.status !== "مكتمل" && t.due_date && t.due_date < new Date().toISOString().slice(0, 10)).length;
  const pendingLeaves = CACHE.leaves.filter(l => l.status === "قيد المراجعة").length;
  const activeEmployees = CACHE.employees.filter(e => e.status === "نشط").length;

  main.innerHTML = `
    <div class="page-head"><div><h2>لوحة المتابعة</h2><div class="desc">نظرة سريعة على العملاء والاستراتيجيات والتاسكات والمرتبات</div></div></div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="lbl">عملاء نشطين</div><div class="val">${activeClients}</div></div>
      <div class="kpi-card"><div class="lbl">استراتيجيات قيد التنفيذ</div><div class="val">${activeStrategies}</div></div>
      <div class="kpi-card"><div class="lbl">تاسكات مفتوحة</div><div class="val">${openTasks}</div></div>
      <div class="kpi-card ${overdueTasks ? "alert" : ""}"><div class="lbl">تاسكات متأخرة</div><div class="val">${overdueTasks}</div></div>
      <div class="kpi-card"><div class="lbl">موظفين نشطين</div><div class="val">${activeEmployees}</div></div>
      <div class="kpi-card"><div class="lbl">طلبات إجازة قيد المراجعة</div><div class="val">${pendingLeaves}</div></div>
      <div class="kpi-card"><div class="lbl">صافي المرتبات (${month})</div><div class="val">${fmtMoney(totalNet)}</div></div>
    </div>
    <div class="card">
      <h3>آخر التاسكات المفتوحة</h3>
      <div class="table-wrap">${tasksTableHTML(CACHE.tasks.filter(t => t.status !== "مكتمل").slice(0, 8))}</div>
    </div>`;
}

  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
